spring.application.name=microservice-gateway
server.port=8080
# Spring Cloud Gateway configuration

spring.cloud.gateway.server.webflux.default-filters[0]=PreserveHostHeader

spring.cloud.gateway.server.webflux.routes[0].id=patients
spring.cloud.gateway.server.webflux.routes[0].uri=http://patient:8081
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/api/patients/**

spring.cloud.gateway.server.webflux.routes[1].id=notes
spring.cloud.gateway.server.webflux.routes[1].uri=http://notes:8083
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/api/notes/**

spring.cloud.gateway.server.webflux.routes[2].id=assessment
spring.cloud.gateway.server.webflux.routes[2].uri=http://assessment:8084
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/api/assessment/**

spring.cloud.gateway.server.webflux.routes[3].id=front
spring.cloud.gateway.server.webflux.routes[3].uri=http://front:8082
spring.cloud.gateway.server.webflux.routes[3].predicates[0]=Path=/**